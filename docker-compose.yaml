services:
  bot:
    container_name: ${BOT_CONTAINER_NAME}
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    networks:
      - tgrbot_network
    restart: unless-stopped
    volumes:
      - ./bot/logs:/app/logs
      - ./bot/data:/app/data

volumes:
  postgres_data:
    driver: local

networks:
  tgrbot_network:
    driver: bridge
